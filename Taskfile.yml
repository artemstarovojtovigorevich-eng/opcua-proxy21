version: '3'

vars:
  BIN_DIR: bin
  CLIENT_BIN: bin/client

tasks:
  build:
    dir: .
    sources:
      - ./cmd/client/**/*.go
    generates:
      - ./bin/client
    cmds:
      - mkdir -p bin
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bin/client ./cmd/client/main.go

  lint:
    cmds:
      - |
        GOLANGCI_LINT=$(go env GOPATH)/bin/golangci-lint
        if [ -f "$GOLANGCI_LINT" ]; then
          $GOLANGCI_LINT run ./...
        else
          echo "golangci-lint not found, installing..."
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          $GOLANGCI_LINT run ./...
        fi

  fmt:
    cmds:
      - go fmt ./...
      - gofmt -s -w .

  test:
    cmds:
      - go test -v ./...

  clean:
    cmds:
      - rm -rf bin

  run:
    deps:
      - build
    cmds:
      - ./bin/client -gen-cert

  run-production:
    deps:
      - build
    cmds:
      - ./bin/client

  docker-build:
    cmds:
      - docker compose build

  docker-up:
    cmds:
      - docker compose up -d

  docker-down:
    cmds:
      - docker compose down

  docker-logs:
    cmds:
      - docker compose logs -f